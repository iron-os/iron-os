name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

jobs:
  packages_server:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.74
      - name: Check
        run: cd packages-server && cargo check
      - name: Run tests
        run: cd packages-server && cargo test

  packages_publisher:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.85
      - name: Check
        run: cd packages-publisher && cargo check
      - name: Run tests
        run: cd packages-publisher && cargo test

  service:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.74
      - name: Create build-config.toml
        run: |
          cat > service/build-config.toml <<'EOF'
          [debug]
          whitelist = ["127.0.0.1", "localhost"]
          EOF
      - name: Check
        run: cd service && cargo check
      - name: Run tests
        run: cd service && cargo test
